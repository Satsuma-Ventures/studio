<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"><style>
.scale { display: flex; align-items: flex-end; gap: 18px; margin-top: 4px; }
.tok { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
.bar { background: var(--grove); height: 28px; border-radius: 2px; }
.name { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
.size { font-family: var(--font-body); font-size: 11px; font-weight: 600; color: var(--deep-ink); }
</style></head><body><div class="card">
  <div class="card-label">Spacing scale · 8px base</div>
  <div class="scale">
    <div class="tok"><div class="bar" style="width:8px"></div><div class="size">8</div><div class="name">--space-xs</div></div>
    <div class="tok"><div class="bar" style="width:16px"></div><div class="size">16</div><div class="name">--space-sm</div></div>
    <div class="tok"><div class="bar" style="width:32px"></div><div class="size">32</div><div class="name">--space-md</div></div>
    <div class="tok"><div class="bar" style="width:48px"></div><div class="size">48</div><div class="name">--space-lg</div></div>
    <div class="tok"><div class="bar" style="width:80px"></div><div class="size">80</div><div class="name">--space-xl</div></div>
    <div class="tok"><div class="bar" style="width:128px"></div><div class="size">128</div><div class="name">--space-2xl</div></div>
  </div>
</div></body></html>
