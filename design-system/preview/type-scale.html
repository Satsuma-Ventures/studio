<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"><style>
table { border-collapse: collapse; width: 100%; }
td { padding: 9px 0; border-bottom: 1px solid var(--rule); vertical-align: baseline; }
.t-display { font-family: var(--font-display); font-size: 32px; font-weight: 400; color: var(--deep-ink); line-height: 1.1; }
.t-h1 { font-family: var(--font-display); font-size: 26px; font-weight: 400; color: var(--deep-ink); }
.t-h2 { font-family: var(--font-body); font-size: 20px; font-weight: 500; color: var(--deep-ink); }
.t-h3 { font-family: var(--font-body); font-size: 17px; font-weight: 500; color: var(--deep-ink); }
.t-body { font-family: var(--font-body); font-size: 16px; font-weight: 400; color: var(--deep-ink); }
.t-label { font-family: var(--font-body); font-size: 12px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--sage-label); }
.meta { font-family: var(--font-mono); font-size: 11px; color: var(--muted); white-space: nowrap; padding-left: 16px; }
</style></head><body><div class="card">
  <div class="card-label">Type scale</div>
  <table>
    <tr><td class="t-display">Display</td><td class="meta">48–64 · Baskerville</td></tr>
    <tr><td class="t-h1">Heading 1</td><td class="meta">36–42 · Baskerville</td></tr>
    <tr><td class="t-h2">Heading 2</td><td class="meta">24–28 · Jakarta 500</td></tr>
    <tr><td class="t-h3">Heading 3</td><td class="meta">18–20 · Jakarta 500</td></tr>
    <tr><td class="t-body">Body copy at sixteen pixels.</td><td class="meta">16 · Jakarta 400 · 1.75</td></tr>
    <tr><td class="t-label">Label / Caption</td><td class="meta">12 · Jakarta 500 · +0.14em</td></tr>
  </table>
</div></body></html>
