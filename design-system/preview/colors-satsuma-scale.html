<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"><style>
.scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
.step { display: flex; flex-direction: column; align-items: center; }
.step .sw { height: 56px; width: 100%; border-radius: 4px; border: 1px solid rgba(0,0,0,0.06); }
.step .lbl { font-family: var(--font-mono); font-size: 9px; color: var(--muted); margin-top: 6px; }
.step .star { font-size: 8px; color: var(--satsuma); margin-top: 1px; height: 9px; }
.scale-title { font-family: var(--font-display); font-size: 16px; color: var(--satsuma); margin-bottom: 14px; }
</style></head><body><div class="card">
  <div class="scale-title">Satsuma · accent scale</div>
  <div class="scale">
    <div class="step"><div class="sw" style="background:#F9F7F6"></div><div class="lbl">50</div><div class="star"></div></div>
    <div class="step"><div class="sw" style="background:#F3ECE8"></div><div class="lbl">100</div><div class="star"></div></div>
    <div class="step"><div class="sw" style="background:#EAD9CD"></div><div class="lbl">200</div><div class="star"></div></div>
    <div class="step"><div class="sw" style="background:#E1B99E"></div><div class="lbl">300</div><div class="star"></div></div>
    <div class="step"><div class="sw" style="background:#DD9564"></div><div class="lbl">400</div><div class="star"></div></div>
    <div class="step"><div class="sw" style="background:#D4681E"></div><div class="lbl">500</div><div class="star">★</div></div>
    <div class="step"><div class="sw" style="background:#AE5519"></div><div class="lbl">600</div><div class="star"></div></div>
    <div class="step"><div class="sw" style="background:#8C4514"></div><div class="lbl">700</div><div class="star"></div></div>
    <div class="step"><div class="sw" style="background:#6E3610"></div><div class="lbl">800</div><div class="star"></div></div>
    <div class="step"><div class="sw" style="background:#51280B"></div><div class="lbl">900</div><div class="star"></div></div>
    <div class="step"><div class="sw" style="background:#2F1707"></div><div class="lbl">950</div><div class="star"></div></div>
  </div>
</div></body></html>
