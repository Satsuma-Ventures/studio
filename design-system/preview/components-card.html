<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"><style>
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.surface { padding: 22px; border-radius: 8px; border: 1px solid var(--rule); }
.surface.white { background: #FFFFFF; }
.surface.bark { background: var(--warm-bark); border-color: transparent; }
.surface .label { font-family: var(--font-body); font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--sage-label); margin-bottom: 10px; }
.surface .title { font-family: var(--font-display); font-size: 18px; color: var(--deep-ink); margin-bottom: 6px; line-height: 1.3; }
.surface .body { font-family: var(--font-body); font-size: 13px; color: var(--muted); line-height: 1.6; }
</style></head><body><div class="card">
  <div class="card-label">Card surfaces · white & warm bark</div>
  <div class="grid">
    <div class="surface white">
      <div class="label">Portfolio</div>
      <div class="title">Internally built businesses</div>
      <div class="body">Concepts developed, validated, and spun out as independent entities over time.</div>
    </div>
    <div class="surface bark">
      <div class="label">Approach</div>
      <div class="title">Patient capital</div>
      <div class="body">Not a fund. Not seeking outside investment. Not optimizing for volume.</div>
    </div>
  </div>
</div></body></html>
