<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"><style>
.row { display: flex; flex-direction: column; gap: 18px; }
.line { font-family: var(--font-body); font-size: 14px; color: var(--deep-ink); line-height: 1.7; }
code { font-family: var(--font-mono); font-size: 0.85em; color: var(--grove); background: var(--warm-bark); padding: 2px 6px; border-radius: 3px; }
.hex { font-family: var(--font-mono); font-size: 12px; color: var(--muted); display: inline-flex; align-items: center; gap: 8px; }
.sw { width: 14px; height: 14px; border-radius: 3px; vertical-align: middle; border: 1px solid rgba(0,0,0,0.08); }
.tag { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
</style></head><body><div class="card">
  <div class="card-label">Code chip & hex inline pattern</div>
  <div class="row">
    <div class="line">The brand background token is <code>--color-mist</code>. Use it as the page fill — never plain white.</div>
    <div class="line">Token <code>--color-grove</code> resolves to <span class="hex"><span class="sw" style="background:#2E5428"></span>#2E5428</span> and is reserved for primary structural color.</div>
    <div class="tag">--font-mono · 0.85em · color Grove · bg Warm Bark · radius 3px</div>
  </div>
</div></body></html>
