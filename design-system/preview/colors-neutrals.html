<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"><style>
.swatches { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.swatch-block { height: 86px; border-radius: 6px; }
.swatch-block.bordered { border: 1px solid var(--rule); }
.swatch-hex { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 10px; }
.swatch-name { font-size: 13px; font-weight: 600; color: var(--deep-ink); margin-top: 3px; }
.swatch-role { font-size: 11px; color: var(--muted); margin-top: 2px; }
</style></head><body><div class="card">
  <div class="swatches">
    <div><div class="swatch-block" style="background:#1C2818"></div><div class="swatch-hex">#1C2818</div><div class="swatch-name">Deep Ink</div><div class="swatch-role">Body text</div></div>
    <div><div class="swatch-block bordered" style="background:#E8DED0"></div><div class="swatch-hex">#E8DED0</div><div class="swatch-name">Warm Bark</div><div class="swatch-role">Card surfaces</div></div>
    <div><div class="swatch-block bordered" style="background:#F6F8F3"></div><div class="swatch-hex">#F6F8F3</div><div class="swatch-name">Mist</div><div class="swatch-role">Cool surface alt</div></div>
    <div><div class="swatch-block bordered" style="background:#D8DDD0"></div><div class="swatch-hex">#D8DDD0</div><div class="swatch-name">Rule</div><div class="swatch-role">Hairline dividers</div></div>
    <div><div class="swatch-block" style="background:#5A6B52"></div><div class="swatch-hex">#5A6B52</div><div class="swatch-name">Muted</div><div class="swatch-role">Secondary text</div></div>
    <div><div class="swatch-block" style="background:#7AAA68"></div><div class="swatch-hex">#7AAA68</div><div class="swatch-name">Sage</div><div class="swatch-role">Decorative</div></div>
  </div>
</div></body></html>
