<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"><style>
.row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
.btn { font-family: var(--font-body); font-size: 14px; font-weight: 500; letter-spacing: 0.04em; padding: 11px 21px; border-radius: 6px; border: 1px solid var(--grove); background: transparent; color: var(--grove); cursor: pointer; transition: background 220ms cubic-bezier(0.22,0.61,0.36,1); }
.btn.hover { background: #EBF0EB; }
.btn.press { background: #D6E2D4; }
.state { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
.tag { font-family: var(--font-mono); font-size: 9px; color: var(--muted); }
</style></head><body><div class="card">
  <div class="card-label">Button · ghost</div>
  <div class="row">
    <div class="state"><button class="btn">Read more</button><div class="tag">default</div></div>
    <div class="state"><button class="btn hover">Read more</button><div class="tag">hover · Grove-100</div></div>
    <div class="state"><button class="btn press">Read more</button><div class="tag">press · Grove-200</div></div>
  </div>
</div></body></html>
