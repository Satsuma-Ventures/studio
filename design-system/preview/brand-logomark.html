<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"><style>
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.lc { border: 1px solid var(--rule); border-radius: 8px; padding: 28px; display: flex; align-items: center; justify-content: center; min-height: 170px; }
.lc.dark { background: #1C2818; border-color: transparent; }
.lc.grove { background: #2E5428; border-color: transparent; }
.lc.mist { background: #FFFFFF; }
.lc img { max-height: 120px; max-width: 90%; }
</style></head><body><div class="card">
  <div class="card-label">Logomark · on light & dark</div>
  <div class="grid">
    <div class="lc mist"><img src="../assets/satsuma-logomark.svg" alt="mark"></div>
    <div class="lc dark"><img src="../assets/satsuma-logomark-light.svg" alt="mark light"></div>
  </div>
</div></body></html>
