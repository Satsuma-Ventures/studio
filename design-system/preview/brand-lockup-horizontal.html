<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"><style>
.grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
.lc { border: 1px solid var(--rule); border-radius: 8px; padding: 26px 32px; display: flex; align-items: center; justify-content: flex-start; min-height: 110px; }
.lc.dark { background: #1C2818; border-color: transparent; }
.lc.mist { background: #FFFFFF; }
.lc img { height: 56px; max-width: 100%; }
</style></head><body><div class="card">
  <div class="card-label">Horizontal lockup</div>
  <div class="grid">
    <div class="lc mist"><img src="../assets/satsuma-lockup.svg" alt="lockup"></div>
    <div class="lc dark"><img src="../assets/satsuma-lockup-light.svg" alt="lockup light"></div>
  </div>
</div></body></html>
