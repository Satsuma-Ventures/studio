<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"><style>
.row { display: flex; flex-direction: column; gap: 18px; }
.eyebrow { font-family: var(--font-body); font-size: 12px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--satsuma); }
.label-ink { font-family: var(--font-body); font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--deep-ink); }
.section-marker { display: flex; align-items: baseline; gap: 20px; }
.num { font-family: var(--font-body); font-size: 11px; font-weight: 600; letter-spacing: 0.14em; color: var(--satsuma); text-transform: uppercase; }
.title { font-family: var(--font-display); font-size: 26px; font-weight: 400; color: var(--grove); }
.meta-row { font-family: var(--font-body); font-size: 12px; color: var(--muted); letter-spacing: 0.04em; }
.tag { font-family: var(--font-mono); font-size: 9px; color: var(--muted); margin-left: 12px; font-weight: 400; letter-spacing: 0; text-transform: none; }
</style></head><body><div class="card">
  <div class="card-label">Labels & section markers</div>
  <div class="row">
    <div class="eyebrow">Seattle, Washington <span class="tag">eyebrow · Satsuma</span></div>
    <div class="label-ink">Mission <span class="tag">in-section label · Deep Ink</span></div>
    <div class="section-marker">
      <span class="num">02</span>
      <span class="title">Logomark</span>
      <span class="tag" style="font-size:9px;">section number · Satsuma</span>
    </div>
    <div class="meta-row">Brand Book &amp; Design System &nbsp;·&nbsp; satsumaventures.com &nbsp;·&nbsp; 2026</div>
  </div>
</div></body></html>
